<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motivational Quotes</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --surface: rgba(255, 255, 255, 0.08);
      --text: #eef2ff;
      --muted: #cbd5e1;
      --accent: #7c3aed;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.28), transparent 30%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 26%),
        var(--bg);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
      text-align: center;
    }

    .app {
      width: min(100%, 720px);
      padding: 40px 36px;
      border-radius: 32px;
      background: var(--surface);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.28);
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 45%);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.18);
      color: #ede9fe;
      font-size: 0.95rem;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      margin: 0 0 18px;
      line-height: 1.05;
      letter-spacing: -0.05em;
      position: relative;
      z-index: 1;
    }

    .quote-card {
      position: relative;
      z-index: 1;
    }

    .quote {
      font-size: clamp(1.5rem, 2vw, 2.2rem);
      line-height: 1.4;
      margin: 0 auto 20px;
      max-width: 680px;
    }

    .author {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      transition: transform 0.2s ease, filter 0.2s ease;
      box-shadow: 0 18px 40px rgba(124, 58, 237, 0.2);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .hint {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      z-index: 1;
    }

    .bg-shape {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
    }

    .bg-shape.one {
      top: -80px;
      left: -80px;
      background: #8b5cf6;
    }

    .bg-shape.two {
      bottom: -100px;
      right: -100px;
      background: #14b8a6;
    }

    @media (max-width: 560px) {
      .app {
        padding: 32px 24px;
      }

      .quote {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <span class="badge">Daily motivation</span>
    <h1>Inspire yourself with a fresh quote.</h1>
    <div class="quote-card">
      <p class="quote" id="quoteText">Loading motivation...</p>
      <p class="author" id="quoteAuthor"></p>
    </div>
    <div class="actions">
      <button id="nextQuoteBtn">Next quote</button>
      <button id="randomQuoteBtn">Surprise me</button>
    </div>
    <p class="hint">Each quote updates the background and keeps the page feeling bright, calm, and energized.</p>
    <div class="bg-shape one"></div>
    <div class="bg-shape two"></div>
  </div>

  <script>
    const quotes = [
      {
        text: "The only way to do great work is to love what you do.",
        author: "Steve Jobs",
        colors: ["#7c3aed", "#06b6d4"]
      },
      {
        text: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        author: "Winston Churchill",
        colors: ["#f97316", "#ec4899"]
      },
      {
        text: "Believe you can and you're halfway there.",
        author: "Theodore Roosevelt",
        colors: ["#10b981", "#3b82f6"]
      },
      {
        text: "Start where you are. Use what you have. Do what you can.",
        author: "Arthur Ashe",
        colors: ["#8b5cf6", "#14b8a6"]
      },
      {
        text: "Dream big and dare to fail.",
        author: "Norman Vaughan",
        colors: ["#facc15", "#f472b6"]
      },
      {
        text: "Don't watch the clock; do what it does. Keep going.",
        author: "Sam Levenson",
        colors: ["#0ea5e9", "#9333ea"]
      },
      {
        text: "Your limitation—it's only your imagination.",
        author: "Unknown",
        colors: ["#fb7185", "#38bdf8"]
      },
      {
        text: "Push yourself, because no one else is going to do it for you.",
        author: "Unknown",
        colors: ["#f97316", "#ec4899"]
      }
    ];

    const quoteText = document.getElementById("quoteText");
    const quoteAuthor = document.getElementById("quoteAuthor");
    const nextQuoteBtn = document.getElementById("nextQuoteBtn");
    const randomQuoteBtn = document.getElementById("randomQuoteBtn");
    const app = document.getElementById("app");

    let currentIndex = 0;
    let intervalId = null;

    const updateQuote = (index) => {
      const quote = quotes[index];
      quoteText.textContent = `"${quote.text}"`;
      quoteAuthor.textContent = `— ${quote.author}`;
      app.style.background = `radial-gradient(circle at top left, ${quote.colors[0]}55, transparent 30%), radial-gradient(circle at bottom right, ${quote.colors[1]}55, transparent 28%), ${quote.colors[0]}`;
    };

    const showNextQuote = () => {
      currentIndex = (currentIndex + 1) % quotes.length;
      updateQuote(currentIndex);
    };

    const showRandomQuote = () => {
      let next = Math.floor(Math.random() * quotes.length);
      if (next === currentIndex) {
        next = (next + 1) % quotes.length;
      }
      currentIndex = next;
      updateQuote(currentIndex);
    };

    nextQuoteBtn.addEventListener("click", () => {
      showNextQuote();
      resetAutoRotate();
    });

    randomQuoteBtn.addEventListener("click", () => {
      showRandomQuote();
      resetAutoRotate();
    });

    const resetAutoRotate = () => {
      clearInterval(intervalId);
      intervalId = setInterval(showRandomQuote, 8000);
    };

    updateQuote(currentIndex);
    intervalId = setInterval(showRandomQuote, 8000);
  </script>
</body>
</html>
