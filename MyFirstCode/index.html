<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Goodwall</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-gradient: linear-gradient(135deg, #6366f1, #ec4899 50%, #f97316);
      --card-bg: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --secondary: #e2e8f0;
      --accent: #f8b4d9;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      background: radial-gradient(circle at top left, rgba(236, 72, 153, 0.24), transparent 32%),
        radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.22), transparent 28%),
        var(--bg-gradient);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      padding: 40px 32px;
      border-radius: 32px;
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 32px 80px rgba(15, 23, 42, 0.18);
    }

    h1 {
      font-size: clamp(2.5rem, 4vw, 4rem);
      letter-spacing: -0.04em;
      margin-bottom: 18px;
      text-transform: capitalize;
    }

    p {
      font-size: 1.25rem;
      color: var(--secondary);
      line-height: 1.7;
      margin-top: 0;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.95rem;
      color: rgba(226, 232, 240, 0.78);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello Goodwall</h1>
    <p class="subtitle">I am Hardik</p>
    <div class="footer">A brighter UI with centered layout and soft color tones.</div>
  </div>
</body>
</html>
